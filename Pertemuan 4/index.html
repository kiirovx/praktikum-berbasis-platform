<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AJAX Profil Fancy</title>

  <!-- Bootstrap + MD1-->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
    }

    body {
      background-image: url('https://mdbootstrap.com/img/Photos/new-templates/valentines-app/img1.jpg');
      background-size: cover;
      background-position: center;
    }

    .mask {
      background-color: rgba(163, 69, 67, .4);
      min-height: 100vh;
    }

    .phone {
      border-radius: 40px;
      min-height: 700px;
      color: #f8e4e3;
    }

    .mask-custom {
      backdrop-filter: blur(15px);
      background-color: rgba(255, 255, 255, .2);
      border: 2px solid rgba(255, 255, 255, .1);
    }

    /* 🔥 Hover Card */
    .card {
      background-color: rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    /* 🔥 Hover Button */
    button {
      transition: all 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* 🔥 Fade Animation */
    .fade-in {
      animation: fadeIn 0.7s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

<div class="mask">
  <div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    
    <div class="col-md-6 col-lg-4">
      <div class="phone mask-custom d-flex align-items-stretch">
        <div class="inner px-4 text-center w-100">

          <h2 class="mt-5 mb-3">Hello 👋</h2>
          <p class="lead mb-4">Klik tombol untuk ambil data tanpa reload</p>

          <!-- BUTTON -->
          <button id="btn" class="btn btn-outline-light btn-rounded btn-lg mb-3">
            Tampilkan Profil
          </button>

          <!-- LOADING -->
          <div id="loading" style="display:none;">⏳ Loading...</div>

          <!-- HASIL -->
          <div id="hasil-profil" class="mt-4 text-start"></div>

        </div>
      </div>
    </div>

  </div>
</div>

<!-- AJAX SCRIPT -->
<script>
document.getElementById("btn").addEventListener("click", function () {

  const loading = document.getElementById("loading");
  const hasil = document.getElementById("hasil-profil");

  loading.style.display = "block";
  hasil.innerHTML = "";

  fetch("index.php")
    .then(response => {
      if (!response.ok) throw new Error("Network error");
      return response.json();
    })
    .then(data => {

      loading.style.display = "none";

      let output = "";

      data.forEach(item => {
        output += `
          <div class="card mb-3 fade-in">
            <div class="card-body">
              <h5>${item.nama}</h5>
              <p class="mb-0">
                <strong>Pekerjaan:</strong> ${item.pekerjaan}<br>
                <strong>Lokasi:</strong> ${item.lokasi}
              </p>
            </div>
          </div>
        `;
      });

      hasil.innerHTML = output;
    })
    .catch(error => {
      loading.innerText = "❌ Gagal mengambil data!";
      console.log(error);
    });

});
</script>

</body>
</html>
