<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ramadhan</title>

<link rel="stylesheet" href="styletugas1.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<section class="home d-flex justify-content-center align-items-center text-center">

<div id="star-field"></div>

<div class="container">

<h2 class="mb-4">
Selamat Ramadhan <br>
2026 / 1447 H
</h2>

<p id="demo" class="mb-4">
Klik dibawah ini untuk mendapatkan THR!
</p>

<button 
class="btn btn-success btn-lg rounded-pill px-4"
data-bs-toggle="modal"
data-bs-target="#thrModal">
Ambil THR
</button>

</div>

<img class="ketupat1" src="ketupat.png">
<img class="ketupat2" src="ketupat.png">

<div class="ornamen-container">
<img src="ornamen.png">
<img src="ornamen.png">
<img src="ornamen.png">
<img src="ornamen.png">
<img src="ornamen.png">
</div>

<img src="bulanramadhan.png" class="bulan-ramadhan">

</section>

<div class="modal fade" id="thrModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center">

      <div class="modal-header">
        <h5 class="modal-title">THR Ramadhan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <h3>🎉 Selamat! 🎉</h3>
        <p>Anda mendapatkan THR Ramadhan!</p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" data-bs-dismiss="modal">
        Terima Kasih
        </button>
      </div>

    </div>
  </div>
</div>

<script>

const field = document.getElementById("star-field");

const STAR_COUNT = 300;

for(let i=0;i<STAR_COUNT;i++){

const star = document.createElement("div");
star.classList.add("star");

const size = Math.random()*3;

star.style.width = size+"px";
star.style.height = size+"px";

star.style.top = Math.random()*100+"%";
star.style.left = Math.random()*100+"%";

star.style.animationDuration = (Math.random()*2+1)+"s";

field.appendChild(star);

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
